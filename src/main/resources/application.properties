# Created 2026-04-13
spring.application.name=employees
server.port=8081

# HTTP Basic, usuario en memoria (UserDetailsServiceAutoConfiguration). Para otro password usa la prop completa o {bcrypt}…
spring.security.user.name=invex
spring.security.user.password=invex123

# Override with DATABASE_URL for MySQL/Oracle or other JDBC URLs.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/invex}
spring.datasource.username=test
spring.datasource.password=test123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-ddl=true

# Consola: correlación y ruta HTTP vía MDC (RequestMdcFilter). Activar DEBUG en el paquete config para ver cabeceras seguras.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [tx=%X{http.transaction_id:-}] [req=%X{http.request_id:-}] %X{http.method:-} %X{http.path:-} %logger{36} - %msg%n
logging.pattern.level=%5p
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO
logging.level.org.springframework.jdbc.core=INFO
# logging.level.com.invex.employees.config=DEBUG

management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
