# Created 2026-04-13
openapi: 3.1.0
info:
  title: Employees API
  version: "1.0"
servers:
  - url: http://localhost:8081
    description: Generated server url
paths:
  /employees/{id}:
    get:
      tags:
        - employee-controller
      summary: Get employee by id
      description: Returns employee by id
      operationId: getEmployeesById
      parameters:
        - $ref: '#/components/parameters/TransactionId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: Successful operation
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "404":
          description: Employee not found
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "500":
          description: Internal server error
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
    put:
      tags:
        - employee-controller
      summary: Update employee
      description: Updates all or a subset of fields
      operationId: updateEmployee
      parameters:
        - $ref: '#/components/parameters/TransactionId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
        required: true
      responses:
        "200":
          description: Successful operation
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEmployeeResponse"
        "400":
          description: Invalid request
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "404":
          description: Employee not found
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "500":
          description: Internal server error
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
    delete:
      tags:
        - employee-controller
      summary: Delete employee
      description: Delete employee by id
      operationId: deleteEmployee
      parameters:
        - $ref: '#/components/parameters/TransactionId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: Deleted
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "404":
          description: Employee not found
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "500":
          description: Internal server error
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
  /employees:
    get:
      tags:
        - employee-controller
      summary: Get all employees
      description: Returns a list of all employees
      operationId: getEmployees
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        "200":
          description: Successful operation
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeesResponse"
        "500":
          description: Internal server error
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
    post:
      tags:
        - employee-controller
      summary: Create employees (batch)
      description: Creates one or more employees in a single request
      operationId: saveEmployees
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeBatchRequest"
        required: true
      responses:
        "201":
          description: Created
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveEmployeesResponse"
        "400":
          description: Invalid request
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "500":
          description: Internal server error
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
  /employees/search:
    get:
      tags:
        - employee-controller
      summary: Search employees
      description: Partial match on names or job title
      operationId: searchEmployees
      parameters:
        - $ref: '#/components/parameters/TransactionId'
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeesResponse"
        "400":
          description: Invalid request
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
        "500":
          description: Internal server error
          headers:
            transaction-id:
              $ref: '#/components/headers/TransactionId'
components:
  parameters:
    TransactionId:
      name: transaction-id
      in: header
      required: false
      description: Identificador de correlación; si se omite el servidor asigna uno y lo devuelve en la respuesta.
      schema:
        type: string
  headers:
    TransactionId:
      description: Id de correlación de la petición (valor enviado o generado por el servidor).
      schema:
        type: string
  schemas:
    EmployeeBatchRequest:
      type: object
      required:
        - employees
      properties:
        employees:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/EmployeeRequest"
    UpdateEmployeeRequest:
      type: object
      properties:
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        secondLastName:
          type: string
        age:
          type: integer
          format: int32
        sex:
          type: string
        birthDay:
          type: string
          format: date
        jobTitle:
          type: string
        enabled:
          type: boolean
    Employee:
      type: object
      properties:
        id:
          type: integer
          format: int32
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        secondLastName:
          type: string
        age:
          type: integer
          format: int32
        sex:
          type: string
        birthDay:
          type: string
          format: date
        jobTitle:
          type: string
        systemRegistration:
          type: string
          format: date-time
        enabled:
          type: boolean
    UpdateEmployeeResponse:
      type: object
      properties:
        employee:
          $ref: "#/components/schemas/Employee"
    EmployeeRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
        middleName:
          type: string
        lastName:
          type: string
          minLength: 1
        secondLastName:
          type: string
          minLength: 1
        age:
          type: integer
          format: int32
        sex:
          type: string
          minLength: 1
        birthDay:
          type: string
          format: date
        jobTitle:
          type: string
          minLength: 1
        enabled:
          type: boolean
      required:
        - age
        - enabled
        - firstName
        - lastName
        - jobTitle
        - secondLastName
        - sex
    SaveEmployeesResponse:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
            format: int32
    EmployeesResponse:
      type: object
      properties:
        employeeList:
          type: array
          items:
            $ref: "#/components/schemas/Employee"
    EmployeeResponse:
      type: object
      properties:
        employee:
          $ref: "#/components/schemas/Employee"
